project_root: .
data_root: data/homework2
output_root: outputs
checkpoint_dir: checkpoints
feature_cache: outputs/deep_features

seed: 42
image_size: [480, 640]
batch_size: 2
num_workers: 2
epochs: 50
lr: 0.001
weight_decay: 0.0001
early_stop_patience: 10
threshold: 0.5

require_cuda: true
amp: true

raft:
  enabled: true
  model: raft_large
  weights: DEFAULT
  max_size: [480, 640]

yolo:
  enabled: true
  model: yolo26n-seg.pt
  imgsz: 640
  conf: 0.20

sam2:
  enabled: true
  repo_dir: third_party/sam2
  checkpoint: third_party/sam2/checkpoints/sam2.1_hiera_base_plus.pt
  config: configs/sam2.1/sam2.1_hiera_b+.yaml

splits:
  train: 0.70
  val: 0.15
  test: 0.15
